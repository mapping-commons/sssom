site_name: "A Simple Standard for Sharing Ontology Mappings (SSSOM)"
site_author: "The SSSOM Community"
theme:
  name: material
  analytics:
    gtag: G-2SYBSJVZ23
  #  palette:
  #    scheme: slate
  #    primary: cyan
  features:
    - content.tabs.link
plugins:
  - search
  - mermaid2
  - redirects:
      redirect_maps:
        "spec-intro.md": spec/intro.md
        "spec-model.md": spec/model.md
        "chaining-rules.md": spec/chaining-rules.md
        "linkml-index.md": spec/linkml-index.md
        "spec-formats.md": spec/formats.md
        "spec-formats-tsv.md": spec/formats-tsv.md
        "spec-formats-json.md": spec/formats-json.md
        "spec-formats-rdf.md": spec/formats-rdf.md
        "spec-formats-owl.md": spec/formats-owl.md
markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - admonition
  #- pymdownx.emoji:
  #    emoji_index: !!python/name:material.extensions.emoji.twemoji
  #    emoji_generator: !!python/name:material.extensions.emoji.to_svg
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
nav:
  - Home: index.md
  - Introduction: introduction.md
  - Getting started: getting-started.md
  - Specification:
      - Development version:
          - Introduction: spec/intro.md
          - Data model:
              - Introduction: spec/model.md
              - Applying Chaining Rules: spec/chaining-rules.md
              - LinkML documentation: spec/linkml-index.md
          - Serialisations:
              - Introduction: spec/formats.md
              - SSSOM/TSV serialisation: spec/formats-tsv.md
              - SSSOM/JSON serialisation: spec/formats-json.md
              - SSSOM/RDF serialisation: spec/formats-rdf.md
              - OWL/RDF serialisation: spec/formats-owl.md
      - Version 1.0:
          - Introduction: spec/v1.0/intro.md
          - Data model:
              - Introduction: spec/v1.0/model.md
              - Applying Chaining Rules: spec/v1.0/chaining-rules.md
              - LinkML documentation: spec/v1.0/linkml-index.md
          - Serialisations:
              - Introduction: spec/v1.0/formats.md
              - SSSOM/TSV serialisation: spec/v1.0/formats-tsv.md
              - SSSOM/JSON serialisation: spec/v1.0/formats-json.md
              - OWL/RDF serialisation: spec/v1.0/formats-owl.md
  - Resources for contributors: contributing.md
  - Resources for users:
      - FAQ: faq.md
      - Community:
          - Use Cases: usecases.md
          - Workshops: workshops.md
          - Presentations: presentations.md
      - Training materials:
          - Overview: training.md
          - Basic Tutorial: tutorial.md
      - How to:
          - Mapping Justifications: mapping-justifications.md
          - How to use mapping predicates: mapping-predicates.md
          - Set up a mapping registry/commons: mapping-commons.md
          - A basic guide for the SSSOM toolkit: toolkit.md
          - 5-Star Entity Mappings - Cheatsheet: 5star-mappings.md
          - Matching tool implementation guide: matching-tool-implementation-guide.md
          - How to gradually enrich OMOP mappings with SSSOM: tutorials/omop-mappings.md
          - How to assess mapping confidence: confidence-model.md
      - Reference:
          - Glossary: glossary.md
  - Related documentation: related-documentation.md
  - Funding: funding.md

site_url: https://mapping-commons.github.io/sssom/
repo_url: https://github.com/mapping-commons/sssom/
edit_uri: "edit/master/src/docs/"
